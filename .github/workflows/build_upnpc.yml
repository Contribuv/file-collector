name: Build upnpc Binary

on:
  workflow_dispatch:

jobs:
  build:
    name: upnpc x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Install and export
        run: |
          sudo apt-get update
          sudo apt-get install -y miniupnpc
          cp /usr/bin/upnpc upnpc_x86_64
          ls -lh upnpc_x86_64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: upnpc_x86_64
          path: upnpc_x86_64
