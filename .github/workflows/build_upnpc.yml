name: Build upnpc Binary

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build_upnpc.yml'

jobs:
  build:
    name: Build upnpc (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            cross_compile: ""
          - arch: aarch64
            cross_compile: "CC=aarch64-linux-gnu-gcc"

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc make git curl wget
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          fi

      - name: Download miniupnpc source
        run: |
          UPnPC_VERSION="2.3.3"
          UPnPC_TAG="miniupnpc_2_3_3"
          echo "Downloading miniupnpc ${UPnPC_VERSION}..."
          
          # 尝试 curl 下载 GitHub release
          if curl -fsSL -o miniupnpc.tar.gz "https://github.com/miniupnp/miniupnp/archive/refs/tags/${UPnPC_TAG}.tar.gz"; then
            echo "GitHub download OK"
          elif curl -fsSL -o miniupnpc.tar.gz "http://miniupnp.free.fr/files/miniupnpc-${UPnPC_VERSION}.tar.gz"; then
            echo "Official site download OK"
          else
            echo "Download failed"
            exit 1
          fi
          
          tar -xzf miniupnpc.tar.gz
          # 查找解压目录
          EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "miniupnp*" | head -1)
          mv "$EXTRACTED_DIR" miniupnpc_src
          if [ -d "miniupnpc_src/miniupnpc" ]; then
            mv miniupnpc_src/miniupnpc miniupnpc
            rm -rf miniupnpc_src
          else
            mv miniupnpc_src miniupnpc
          fi
          echo "Source dir:"
          ls -la miniupnpc/

      - name: Build upnpc (${{ matrix.arch }})
        run: |
          cd miniupnpc
          if [ -n "${{ matrix.cross_compile }}" ]; then
            export ${{ matrix.cross_compile }}
            echo "Cross-compiling for aarch64..."
          fi
          make
          make upnpc
          echo "Build complete:"
          file upnpc
          ls -lh upnpc

      - name: Rename and prepare artifact
        run: |
          cd miniupnpc
          cp upnpc "../upnpc_${{ matrix.arch }}"
          chmod +x "../upnpc_${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: upnpc_${{ matrix.arch }}
          path: upnpc_${{ matrix.arch }}
