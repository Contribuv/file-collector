name: Build upnpc Binary

on:
  workflow_dispatch:

jobs:
  build:
    name: Build upnpc (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential curl
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            sudo apt-get install -y -qq gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
          fi

      - name: Download and extract source
        run: |
          VERSION="2.3.3"
          TAG="miniupnpc_2_3_3"
          echo "::group::Downloading miniupnpc ${VERSION}"
          curl -vSL -o miniupnpc.tar.gz "https://github.com/miniupnp/miniupnp/archive/refs/tags/${TAG}.tar.gz"
          echo "::endgroup::"
          
          echo "::group::Extracting"
          tar -xzf miniupnpc.tar.gz
          ls -la
          # GitHub archive: miniupnp-{TAG}/miniupnpc/
          SRC_DIR=$(find . -maxdepth 1 -type d -name "miniupnp-*" | head -1)
          echo "Found: ${SRC_DIR}"
          mv "${SRC_DIR}/miniupnpc" .
          rm -rf "${SRC_DIR}"
          rm -f miniupnpc.tar.gz
          echo "::endgroup::"
          
          echo "::group::Source files"
          ls -la miniupnpc/
          echo "::endgroup::"

      - name: Build upnpc
        run: |
          cd miniupnpc
          echo "==> Building for ${{ matrix.arch }}..."
          
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export AR=aarch64-linux-gnu-ar
            export RANLIB=aarch64-linux-gnu-ranlib
          fi
          
          echo "CC=${CC:-default}"
          make clean 2>/dev/null || true
          make
          
          echo "==> Build result:"
          file upnpc
          ls -lh upnpc

      - name: Prepare artifact
        run: |
          cp miniupnpc/upnpc "upnpc_${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: upnpc_${{ matrix.arch }}
          path: upnpc_${{ matrix.arch }}
