<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ filename }} - 文件过大</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body {
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5; color: #666;
  }
  .box {
    text-align: center; padding: 40px 32px;
    background: #fff; border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    max-width: 420px; width: 90%;
  }
  .icon { margin-bottom: 16px; }
  .icon svg { width: 48px; height: 48px; color: #ccc; }
  .title { font-size: 1.15rem; font-weight: 600; color: #333; margin-bottom: 8px; }
  .info { font-size: 0.9rem; color: #888; margin-bottom: 24px; line-height: 1.6; }
  .filename { color: #333; font-weight: 500; word-break: break-all; }
  .size { color: #4b89ff; font-weight: 600; }
  .btn {
    display: inline-block; padding: 10px 28px;
    background: #4b89ff; color: #fff; text-decoration: none;
    border-radius: 6px; font-size: 0.9rem; transition: background .2s;
  }
  .btn:hover { background: #3a78ee; }
  .hint { font-size: .78rem; color: #aaa; margin-top: 12px; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
  </div>
  <div class="title">文件过大，无法预览</div>
  <div class="info">
    <span class="filename">{{ filename }}</span><br>
    文件大小 <span class="size">{{ "%.1f"|format(file_size / 1024 / 1024) }} MB</span>，超过 30MB 预览限制
  </div>
  <a class="btn" href="{{ download_url }}">下载文件</a>
  <div class="hint" id="status"></div>
</div>
<script>
  // 通知父窗口并自动关闭
  (function() {
    if (window.opener && !window.opener.closed) {
      try {
        window.opener.postMessage({
          type: 'file-too-large',
          filename: {{ filename|tojson }},
          sizeMB: {{ "%.1f"|format(file_size / 1024 / 1024) }},
          downloadUrl: {{ download_url|tojson }}
        }, '*');
      } catch(e) {}
    }
    var statusEl = document.getElementById('status');
    if (statusEl) statusEl.textContent = '请返回原页面下载文件';
    // 3 秒后自动关闭（仅当从 opener 打开时）
    if (window.opener && !window.opener.closed) {
      setTimeout(function() {
        try { window.close(); } catch(e) {}
      }, 3000);
    }
  })();
</script>
</body>
</html>
