<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ filename }} - 文本阅读</title>
<style>
  :root {
    --bg: #1a1a1b;
    --text: #d4d4d4;
    --text-dim: #888;
    --bar-bg: rgba(255,255,255,.04);
    --btn-bg: rgba(255,255,255,.08);
    --btn-hover: rgba(255,255,255,.14);
    --font-size: 16px;
    --line-height: 1.9;
    --content-width: 700px;
    --sidebar-w: 260px;
  }
  :root.light {
    --bg: #f5f0e8;
    --text: #333;
    --text-dim: #999;
    --bar-bg: rgba(0,0,0,.04);
    --btn-bg: rgba(0,0,0,.06);
    --btn-hover: rgba(0,0,0,.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Noto Serif SC", "Source Han Serif SC", "PingFang SC", Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background .3s, color .3s;
  }
  /* Top bar */
  .reader-bar {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--bar-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,.06);
    flex-wrap: wrap;
  }
  .reader-bar .fn {
    font-size: .82rem; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; min-width: 0;
  }
  .reader-bar button {
    background: var(--btn-bg); color: var(--text);
    border: none; border-radius: 4px;
    padding: 4px 10px; font-size: .78rem; cursor: pointer;
    transition: background .15s; white-space: nowrap;
  }
  .reader-bar button:hover { background: var(--btn-hover); }
  .reader-bar button.active { background: rgba(59,130,246,.3); color: #93c5fd; }
  .reader-bar .sep { width: 1px; height: 18px; background: rgba(255,255,255,.1); margin: 0 2px; }
  #btn-toc { position: relative; }
  #btn-toc .badge {
    position: absolute; top: -4px; right: -6px;
    background: #3b82f6; color: #fff;
    font-size: .6rem; border-radius: 8px;
    padding: 0 4px; line-height: 14px;
    display: none;
  }
  #btn-toc .badge.show { display: block; }
  /* Sidebar (desktop) */
  .toc-sidebar {
    position: fixed; top: 0; left: 0;
    width: var(--sidebar-w); height: 100vh;
    background: #141418;
    border-right: 1px solid rgba(255,255,255,.06);
    z-index: 20;
    transform: translateX(-100%);
    transition: transform .25s ease;
    display: flex; flex-direction: column;
  }
  .toc-sidebar.open { transform: translateX(0); }
  .toc-sidebar-header {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    display: flex; align-items: center; gap: 8px;
    font-size: .85rem; font-weight: 500;
  }
  .toc-sidebar-header .close-btn {
    margin-left: auto; background: none; border: none;
    color: var(--text-dim); font-size: 1.2rem; cursor: pointer;
  }
  .toc-sidebar-list {
    flex: 1; overflow-y: auto;
    padding: 4px 0;
  }
  .toc-sidebar-list a {
    display: block; padding: 7px 14px;
    font-size: .78rem; color: var(--text-dim);
    text-decoration: none;
    border-left: 2px solid transparent;
    transition: all .12s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .toc-sidebar-list a:hover { color: #fff; background: rgba(255,255,255,.04); }
  .toc-sidebar-list a.active { color: #93c5fd; border-left-color: #3b82f6; background: rgba(59,130,246,.08); }
  /* Overlay */
  .toc-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 19; display: none;
  }
  .toc-overlay.show { display: block; }
  /* Loading */
  .reader-loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 12px;
  }
  .reader-loading .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,.1);
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  .reader-loading .progress-text {
    font-size: .82rem; color: var(--text-dim);
  }
  .reader-loading.hidden { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Content */
  .reader-content {
    max-width: var(--content-width);
    margin: 0 auto;
    padding: 32px 20px 80px;
    font-size: var(--font-size);
    line-height: var(--line-height);
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: break-word;
  }
  .reader-content.hidden { display: none; }
  .chapter-heading {
    display: block;
    font-size: calc(var(--font-size) + 2px);
    font-weight: 700;
    text-align: center;
    margin: 2em 0 .6em;
    color: var(--text);
  }
  /* Error */
  .reader-error {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 12px;
  }
  .reader-error.show { display: flex; }
  .reader-error .err-title { font-size: 1rem; color: #f87171; }
  .reader-error .err-desc { font-size: .82rem; color: var(--text-dim); }
  /* Mobile */
  @media (max-width: 768px) {
    .reader-bar { padding: 6px 10px; gap: 4px; }
    .reader-bar button { padding: 3px 8px; font-size: .74rem; }
    .reader-content { padding: 24px 14px 60px; max-width: 100%; }
    .toc-sidebar {
      top: auto; bottom: 0; left: 0; right: 0;
      width: 100%; height: 55vh;
      border-radius: 14px 14px 0 0;
      transform: translateY(100%);
    }
    .toc-sidebar.open { transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="reader-bar">
  <span class="fn">{{ filename }}</span>
  <button id="btn-theme" onclick="toggleTheme()" title="切换主题">☀</button>
  <span class="sep"></span>
  <button onclick="changeFontSize(-1)" title="缩小字号">A-</button>
  <button onclick="changeFontSize(1)" title="放大字号">A+</button>
  <span class="sep"></span>
  <button onclick="cycleLineHeight()" title="切换行高">行高</button>
  <button onclick="cycleWidth()" title="切换页宽">页宽</button>
  <span class="sep"></span>
  <button id="btn-toc" onclick="toggleToc()" title="章节目录">目录<span class="badge" id="toc-badge"></span></button>
</div>

<div class="toc-overlay" id="toc-overlay" onclick="closeToc()"></div>
<div class="toc-sidebar" id="toc-sidebar">
  <div class="toc-sidebar-header">
    章节目录
    <button class="close-btn" onclick="closeToc()">✕</button>
  </div>
  <div class="toc-sidebar-list" id="toc-list"></div>
</div>

<div class="reader-loading" id="loading">
  <div class="spinner"></div>
  <div class="progress-text" id="progress">加载中...</div>
</div>

<div class="reader-error" id="error">
  <div class="err-title">加载失败</div>
  <div class="err-desc" id="err-msg">无法读取文件内容</div>
</div>

<div class="reader-content hidden" id="content"></div>

<script>
var _fileUrl = {{ file_url|tojson }};
var _filename = {{ filename|tojson }};

// ===== Settings =====
var _fontSize = 16;
var _lhIdx = 0, _widthIdx = 0;
var _lineHeights = [1.9, 1.6, 2.2];
var _widths = ['700px', '560px', '100%'];
var _chapters = [];

function applySettings() {
  document.documentElement.style.setProperty('--font-size', _fontSize + 'px');
  document.documentElement.style.setProperty('--line-height', _lineHeights[_lhIdx]);
  document.documentElement.style.setProperty('--content-width', _widths[_widthIdx]);
}

function changeFontSize(delta) {
  _fontSize = Math.max(12, Math.min(28, _fontSize + delta * 2));
  applySettings();
}

function cycleLineHeight() { _lhIdx = (_lhIdx + 1) % _lineHeights.length; applySettings(); }
function cycleWidth() { _widthIdx = (_widthIdx + 1) % _widths.length; applySettings(); }

function toggleTheme() {
  var html = document.documentElement;
  var btn = document.getElementById('btn-theme');
  html.classList.toggle('light');
  btn.textContent = html.classList.contains('light') ? '☾' : '☀';
}

// ===== Chapter detection =====
var _CHAPTER_RE = /^[  \t]*(?:第[零〇一二三四五六七八九十百千0-9]+[章节卷部篇]|第?\s*[0-9]{1,4}\s*[章节卷部篇]|[Cc]hapter\s+[0-9IVXivx]+|(?:序章|楔子|尾声|番外[篇]?|后记|前言|引言|尾声|终章|跋|附录))/m;

function parseChapters(text) {
  var lines = text.split('\n');
  var chapters = [];
  var contentEl = document.getElementById('content');
  var html = '';

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    var m = line.match(_CHAPTER_RE);
    if (m) {
      var title = line.trim().substring(0, 40);
      var anchorId = 'ch-' + chapters.length;
      chapters.push({ id: anchorId, title: title, line: i });
      html += '<span class="chapter-heading" id="' + anchorId + '">' + escapeHtml(title) + '</span>\n';
    } else {
      html += escapeHtml(line) + '\n';
    }
  }

  contentEl.innerHTML = html;
  return chapters;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== TOC sidebar =====
function buildToc() {
  var list = document.getElementById('toc-list');
  var badge = document.getElementById('toc-badge');
  list.innerHTML = '';

  if (_chapters.length === 0) {
    list.innerHTML = '<a style="color:var(--text-dim);cursor:default">未检测到章节</a>';
    badge.classList.remove('show');
    return;
  }

  badge.textContent = _chapters.length;
  badge.classList.add('show');

  _chapters.forEach(function(ch) {
    var a = document.createElement('a');
    a.href = '#' + ch.id;
    a.textContent = ch.title;
    a.onclick = function(e) {
      e.preventDefault();
      scrollToChapter(ch.id);
      closeToc();
    };
    list.appendChild(a);
  });
}

function scrollToChapter(id) {
  var el = document.getElementById(id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function openToc() {
  document.getElementById('toc-sidebar').classList.add('open');
  document.getElementById('toc-overlay').classList.add('show');
}
function closeToc() {
  document.getElementById('toc-sidebar').classList.remove('open');
  document.getElementById('toc-overlay').classList.remove('show');
}
function toggleToc() {
  var sidebar = document.getElementById('toc-sidebar');
  sidebar.classList.contains('open') ? closeToc() : openToc();
}

// ===== Highlight current chapter on scroll =====
var _scrollTimer;
function onContentScroll() {
  clearTimeout(_scrollTimer);
  _scrollTimer = setTimeout(updateActiveChapter, 100);
}

function updateActiveChapter() {
  if (_chapters.length === 0) return;
  var top = window.scrollY + 120; // a bit below top bar
  var active = null;
  for (var i = _chapters.length - 1; i >= 0; i--) {
    var el = document.getElementById(_chapters[i].id);
    if (el && el.offsetTop <= top) { active = _chapters[i]; break; }
  }
  if (!active) active = _chapters[0];
  var links = document.querySelectorAll('#toc-list a');
  links.forEach(function(a) { a.classList.remove('active'); });
  var match = document.querySelector('#toc-list a[href="#' + active.id + '"]');
  if (match) { match.classList.add('active'); match.scrollIntoView({block:'nearest'}); }
}

// ===== Load file =====
(function loadFile() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', _fileUrl);
  xhr.responseType = 'text';
  xhr.overrideMimeType('text/plain; charset=utf-8');

  xhr.onprogress = function(e) {
    if (e.lengthComputable) {
      var pct = Math.round(e.loaded / e.total * 100);
      var mb = (e.total / 1048576).toFixed(1);
      document.getElementById('progress').textContent =
        '加载中 ' + pct + '% （共 ' + mb + ' MB）';
    }
  };

  xhr.onload = function() {
    document.getElementById('loading').classList.add('hidden');
    if (xhr.status === 200) {
      var text = xhr.responseText;
      if (text.indexOf('\uFFFD') > text.length * 0.1) {
        tryReloadAsGBK();
        return;
      }
      displayContent(text);
    } else {
      showError('服务器返回 ' + xhr.status);
    }
  };

  xhr.onerror = function() {
    document.getElementById('loading').classList.add('hidden');
    showError('网络错误，无法加载文件');
  };

  xhr.send();
})();

function tryReloadAsGBK() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', _fileUrl);
  xhr.responseType = 'arraybuffer';

  xhr.onload = function() {
    document.getElementById('loading').classList.add('hidden');
    if (xhr.status === 200) {
      var decoder = new TextDecoder('gbk');
      var text = decoder.decode(new Uint8Array(xhr.response));
      displayContent(text);
    } else {
      showError('服务器返回 ' + xhr.status);
    }
  };

  xhr.onerror = function() {
    document.getElementById('loading').classList.add('hidden');
    showError('网络错误');
  };

  document.getElementById('progress').textContent = '正在重新解码...';
  xhr.send();
}

function displayContent(text) {
  var content = document.getElementById('content');
  _chapters = parseChapters(text);
  buildToc();
  content.classList.remove('hidden');
  window.addEventListener('scroll', onContentScroll, {passive: true});
}

function showError(msg) {
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('error').classList.add('show');
}
</script>
</body>
</html>
