<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ filename }} - TXT 阅读器</title>
<style>
  :root {
    --rdr-bg: #f5f0e8;
    --rdr-text: #333;
    --rdr-chapter: #222;
    --rdr-sidebar-bg: #fff;
    --rdr-sidebar-text: #555;
    --rdr-sidebar-hover: #f0ebe0;
    --rdr-sidebar-active: #e8dcc8;
    --rdr-btn-bg: #fff;
    --rdr-btn-hover: #e8dcc8;
    --rdr-border: #ddd;
    --rdr-shadow: rgba(0,0,0,0.08);
  }
  .theme-dark {
    --rdr-bg: #1a1a2e;
    --rdr-text: #ccc;
    --rdr-chapter: #e0e0e0;
    --rdr-sidebar-bg: #16213e;
    --rdr-sidebar-text: #aaa;
    --rdr-sidebar-hover: #1f3460;
    --rdr-sidebar-active: #0f3460;
    --rdr-btn-bg: #16213e;
    --rdr-btn-hover: #1f3460;
    --rdr-border: #2a2a4a;
    --rdr-shadow: rgba(0,0,0,0.3);
  }
  .theme-sepia {
    --rdr-bg: #f4ecd8;
    --rdr-text: #5b4636;
    --rdr-chapter: #3e2f1c;
    --rdr-sidebar-bg: #faf3e0;
    --rdr-sidebar-text: #8b7355;
    --rdr-sidebar-hover: #efe0c0;
    --rdr-sidebar-active: #e8d5a8;
    --rdr-btn-bg: #faf3e0;
    --rdr-btn-hover: #e8d5a8;
    --rdr-border: #d4c5a0;
    --rdr-shadow: rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* ========== Top Toolbar ========== */
  .rdr-toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 44px; display: flex; align-items: center; gap: 8px;
    padding: 0 12px;
    background: var(--rdr-sidebar-bg);
    border-bottom: 1px solid var(--rdr-border);
    box-shadow: 0 1px 3px var(--rdr-shadow);
  }
  .rdr-toolbar .rdr-filename {
    flex: 1; font-size: 13px; color: var(--rdr-text); overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; font-weight: 500;
  }
  .rdr-toolbar button {
    width: 32px; height: 32px; border: 1px solid var(--rdr-border);
    border-radius: 6px; background: var(--rdr-btn-bg); color: var(--rdr-text);
    cursor: pointer; font-size: 14px; display: flex; align-items: center;
    justify-content: center; transition: background 0.15s;
  }
  .rdr-toolbar button:hover { background: var(--rdr-btn-hover); }
  .rdr-toolbar button.active { background: var(--rdr-sidebar-active); font-weight: bold; }
  .rdr-toc-btn { position: relative; }
  .rdr-toc-btn .rdr-badge {
    position: absolute; top: -4px; right: -4px;
    background: #e74c3c; color: #fff; font-size: 10px;
    min-width: 16px; height: 16px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px; display: none;
  }
  .rdr-download-btn {
    text-decoration: none; font-size: 11px !important;
    padding: 0 10px !important; width: auto !important;
  }

  /* ========== Sidebar ========== */
  .rdr-sidebar {
    position: fixed; top: 44px; left: 0; bottom: 0; z-index: 90;
    width: 240px; background: var(--rdr-sidebar-bg);
    border-right: 1px solid var(--rdr-border);
    overflow-y: auto; transform: translateX(-100%);
    transition: transform 0.25s ease;
  }
  .rdr-sidebar.open { transform: translateX(0); }
  .rdr-sidebar .rdr-toc-title {
    padding: 14px 16px 10px; font-size: 13px; font-weight: 600;
    color: var(--rdr-chapter); border-bottom: 1px solid var(--rdr-border);
    position: sticky; top: 0; background: var(--rdr-sidebar-bg);
    z-index: 2;
  }
  .rdr-sidebar .rdr-toc-item {
    display: block; width: 100%; padding: 10px 16px;
    border: none; border-bottom: 1px solid #f0f0f0;
    background: transparent; color: var(--rdr-sidebar-text);
    font-size: 13px; text-align: left; cursor: pointer;
    transition: background 0.15s; line-height: 1.4;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .theme-dark .rdr-sidebar .rdr-toc-item { border-bottom-color: #1f2f40; }
  .rdr-sidebar .rdr-toc-item:hover { background: var(--rdr-sidebar-hover); }
  .rdr-sidebar .rdr-toc-item.active { background: var(--rdr-sidebar-active); color: var(--rdr-chapter); font-weight: 600; }
  .rdr-sidebar-overlay {
    display: none; position: fixed; top: 44px; left: 0; right: 0; bottom: 0;
    z-index: 89; background: rgba(0,0,0,0.3);
  }
  .rdr-sidebar-overlay.show { display: block; }

  /* ========== Reading Area ========== */
  .rdr-main {
    position: fixed; top: 44px; left: 0; right: 0; bottom: 0;
    overflow-y: auto; overflow-x: hidden;
    background: var(--rdr-bg); transition: background 0.3s;
    -webkit-overflow-scrolling: touch;
  }
  .rdr-content {
    max-width: 720px; margin: 0 auto; padding: 32px 24px 80px;
  }
  .rdr-chapter-title {
    font-size: 22px; font-weight: 700; color: var(--rdr-chapter);
    text-align: center; margin-bottom: 28px; line-height: 1.4;
  }
  .rdr-text {
    font-size: 17px; line-height: 2; color: var(--rdr-text);
    white-space: pre-wrap; word-break: break-all;
    font-family: 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'SimSun', 'Songti SC', Georgia, serif;
  }
  .rdr-text.font-sm { font-size: 15px; line-height: 1.9; }
  .rdr-text.font-lg { font-size: 19px; line-height: 2.1; }
  .rdr-text.font-xl { font-size: 21px; line-height: 2.2; }

  /* Pagination */
  .rdr-pager {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; padding: 28px 0 12px;
  }
  .rdr-pager button {
    padding: 8px 20px; border: 1px solid var(--rdr-border);
    border-radius: 20px; background: var(--rdr-btn-bg);
    color: var(--rdr-text); cursor: pointer; font-size: 14px;
    transition: all 0.15s;
  }
  .rdr-pager button:hover:not(:disabled) { background: var(--rdr-btn-hover); }
  .rdr-pager button:disabled { opacity: 0.4; cursor: default; }
  .rdr-pager .rdr-page-info { font-size: 13px; color: var(--rdr-sidebar-text); min-width: 80px; text-align: center; }

  /* Loading */
  .rdr-loading {
    display: flex; align-items: center; justify-content: center;
    height: 200px; color: var(--rdr-sidebar-text); font-size: 14px;
  }
  .rdr-loading .rdr-spinner {
    width: 24px; height: 24px; border: 2px solid var(--rdr-border);
    border-top-color: #888; border-radius: 50%; animation: spin 0.7s linear infinite;
    margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .rdr-error {
    text-align: center; padding: 60px 20px; color: var(--rdr-sidebar-text);
  }
  .rdr-error .rdr-error-icon { font-size: 3rem; margin-bottom: 12px; }
  .rdr-error .rdr-error-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; color: var(--rdr-chapter); }
  .rdr-error a { color: #4b89ff; text-decoration: none; font-size: 14px; }
  .rdr-error a:hover { text-decoration: underline; }

  /* Back to top */
  .rdr-back-top {
    position: fixed; bottom: 24px; right: 24px; z-index: 80;
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--rdr-border); background: var(--rdr-btn-bg);
    color: var(--rdr-text); cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px var(--rdr-shadow);
    transition: all 0.2s; opacity: 0; pointer-events: none;
  }
  .rdr-back-top.visible { opacity: 1; pointer-events: auto; }
  .rdr-back-top:hover { background: var(--rdr-btn-hover); transform: translateY(-2px); }

  /* ========== Responsive ========== */
  @media (max-width: 768px) {
    .rdr-sidebar { width: 260px; }
    .rdr-content { padding: 20px 16px 80px; }
    .rdr-text { font-size: 16px; }
    .rdr-text.font-sm { font-size: 14px; }
    .rdr-text.font-lg { font-size: 18px; }
    .rdr-text.font-xl { font-size: 20px; }
    .rdr-chapter-title { font-size: 19px; margin-bottom: 20px; }
    .rdr-pager { gap: 10px; }
    .rdr-pager button { padding: 6px 16px; font-size: 13px; }
  }
</style>
</head>
<body>

<!-- Toolbar -->
<div class="rdr-toolbar">
  <button class="rdr-toc-btn" id="tocBtn" title="目录">☰<span class="rdr-badge" id="tocBadge">0</span></button>
  <span class="rdr-filename" title="{{ filename }}">{{ filename }}</span>
  <button id="fontDownBtn" title="缩小字体">A⁻</button>
  <button id="fontUpBtn" title="放大字体">A⁺</button>
  <button id="themeBtn" title="切换主题">☀</button>
  <a class="rdr-download-btn" href="{{ download_url }}" title="下载文件">⬇ 下载</a>
</div>

<!-- Sidebar Overlay -->
<div class="rdr-sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar -->
<div class="rdr-sidebar" id="sidebar">
  <div class="rdr-toc-title">📑 目录</div>
  <div id="tocList"></div>
</div>

<!-- Main Reading Area -->
<div class="rdr-main" id="mainArea">
  <div class="rdr-content" id="contentArea">
    <div class="rdr-loading">
      <div class="rdr-spinner"></div>正在加载...
    </div>
  </div>
</div>

<!-- Back to Top -->
<button class="rdr-back-top" id="backTopBtn" title="回到顶部">↑</button>

<script>
(function() {
  // ========== Config from server ==========
  var TXT_INFO_URL = {{ txt_info_url|tojson }};
  var TXT_CHUNK_URL = {{ txt_chunk_url|tojson }};

  // ========== State ==========
  var _chapters = [];         // [{title, offset}]
  var _encoding = 'utf-8';
  var _totalSize = 0;
  var _currentChapterIdx = 0;
  var _currentPage = 0;       // page within current chapter
  var _chapterPages = [];     // [[text_page0, text_page1, ...], ...]
  var _fontSizeLevel = 1;     // 0=sm, 1=normal, 2=lg, 3=xl
  var _themeIdx = 0;          // 0=light, 1=dark, 2=sepia
  var _themes = ['', 'theme-dark', 'theme-sepia'];
  var _themeIcons = ['☀', '🌙', '📖'];
  var CHUNK_SIZE = 65536;     // 64KB per fetch
  var CHARS_PER_PAGE = 4000;   // characters per displayed page
  var tocOpen = false;

  // ========== DOM ==========
  var $main = document.getElementById('mainArea');
  var $content = document.getElementById('contentArea');
  var $sidebar = document.getElementById('sidebar');
  var $overlay = document.getElementById('sidebarOverlay');
  var $tocBtn = document.getElementById('tocBtn');
  var $tocBadge = document.getElementById('tocBadge');
  var $tocList = document.getElementById('tocList');
  var $backTop = document.getElementById('backTopBtn');

  // ========== Sidebar Toggle ==========
  function openToc() {
    tocOpen = true;
    $sidebar.classList.add('open');
    $overlay.classList.add('show');
  }
  function closeToc() {
    tocOpen = false;
    $sidebar.classList.remove('open');
    $overlay.classList.remove('show');
  }
  $tocBtn.addEventListener('click', function() { tocOpen ? closeToc() : openToc(); });
  $overlay.addEventListener('click', closeToc);

  // ========== Back to Top ==========
  $main.addEventListener('scroll', function() {
    $backTop.classList.toggle('visible', $main.scrollTop > 400);
  });
  $backTop.addEventListener('click', function() { $main.scrollTop = 0; });

  // ========== Theme ==========
  var themeBtn = document.getElementById('themeBtn');
  function applyTheme() {
    document.body.className = _themes[_themeIdx];
    themeBtn.textContent = _themeIcons[_themeIdx];
    try { localStorage.setItem('txt_reader_theme', _themeIdx); } catch(e) {}
  }
  themeBtn.addEventListener('click', function() {
    _themeIdx = (_themeIdx + 1) % 3;
    applyTheme();
  });
  // Restore theme
  try { var saved = localStorage.getItem('txt_reader_theme'); if (saved !== null) _themeIdx = parseInt(saved) % 3; } catch(e) {}
  applyTheme();

  // ========== Font Size ==========
  var $textEl = null;
  function applyFontSize() {
    if (!$textEl) return;
    $textEl.classList.remove('font-sm', 'font-lg', 'font-xl');
    if (_fontSizeLevel === 0) $textEl.classList.add('font-sm');
    else if (_fontSizeLevel === 2) $textEl.classList.add('font-lg');
    else if (_fontSizeLevel === 3) $textEl.classList.add('font-xl');
    try { localStorage.setItem('txt_reader_font', _fontSizeLevel); } catch(e) {}
  }
  document.getElementById('fontDownBtn').addEventListener('click', function() {
    if (_fontSizeLevel > 0) { _fontSizeLevel--; applyFontSize(); }
  });
  document.getElementById('fontUpBtn').addEventListener('click', function() {
    if (_fontSizeLevel < 3) { _fontSizeLevel++; applyFontSize(); }
  });
  try { var fs = localStorage.getItem('txt_reader_font'); if (fs !== null) _fontSizeLevel = Math.max(0, Math.min(3, parseInt(fs))); } catch(e) {}

  // ========== API Calls ==========
  async function fetchInfo() {
    var resp = await fetch(TXT_INFO_URL);
    if (!resp.ok) throw new Error('获取文件信息失败 (HTTP ' + resp.status + ')');
    var data = await resp.json();
    _chapters = data.chapters || [];
    _encoding = data.encoding || 'utf-8';
    _totalSize = data.total_size || 0;
    _chapterPages = _chapters.map(function() { return []; });
    // If no chapters found, create a single "全文" chapter at offset 0
    if (_chapters.length === 0) {
      _chapters = [{title: '全文', offset: 0}];
      _chapterPages = [[]];
    }
    // Update badge
    $tocBadge.textContent = _chapters.length;
    $tocBadge.style.display = _chapters.length > 1 ? 'flex' : 'none';
    renderToc();
  }

  async function fetchChunk(offset, size) {
    var url = TXT_CHUNK_URL + '?offset=' + offset + '&size=' + size;
    var resp = await fetch(url);
    if (!resp.ok) throw new Error('读取文件失败 (HTTP ' + resp.status + ')');
    return await resp.json();
  }

  // ========== Pagination ==========
  function splitIntoPages(text) {
    var pages = [];
    var remaining = text;
    while (remaining.length > 0) {
      if (remaining.length <= CHARS_PER_PAGE) {
        pages.push(remaining);
        break;
      }
      // Find a good break point (paragraph boundary) near CHARS_PER_PAGE
      var cutPoint = CHARS_PER_PAGE;
      // Look backward for \n\n or \n within 500 chars
      var searchStart = Math.max(0, cutPoint - 500);
      var searchRegion = remaining.substring(searchStart, cutPoint + 100);
      var lastBreak = searchRegion.lastIndexOf('\n\n');
      if (lastBreak === -1) lastBreak = searchRegion.lastIndexOf('\n');
      if (lastBreak !== -1) {
        cutPoint = searchStart + lastBreak + 1;
      }
      pages.push(remaining.substring(0, cutPoint));
      remaining = remaining.substring(cutPoint);
    }
    return pages;
  }

  async function loadChapter(chIdx) {
    if (chIdx < 0 || chIdx >= _chapters.length) return;
    _currentChapterIdx = chIdx;

    // Check if already loaded
    if (_chapterPages[chIdx] && _chapterPages[chIdx].length > 0) {
      _currentPage = 0;
      renderPage();
      updateTocActive();
      $main.scrollTop = 0;
      return;
    }

    // Load chapter content
    showLoading('正在加载章节...');
    try {
      var ch = _chapters[chIdx];
      var nextOffset = (chIdx + 1 < _chapters.length) ? _chapters[chIdx + 1].offset : _totalSize;
      var chSize = nextOffset - ch.offset;

      // Fetch all chunks for this chapter
      var fullText = '';
      var offset = ch.offset;
      while (offset < nextOffset) {
        var chunkSize = Math.min(CHUNK_SIZE, nextOffset - offset);
        var chunk = await fetchChunk(offset, chunkSize);
        fullText += chunk.text;
        offset += chunkSize;
      }

      // Split into pages
      _chapterPages[chIdx] = splitIntoPages(fullText);
      _currentPage = 0;
      renderPage();
      updateTocActive();
      $main.scrollTop = 0;
    } catch(e) {
      showError('加载章节失败: ' + (e.message || '未知错误'));
    }
  }

  function renderPage() {
    var chIdx = _currentChapterIdx;
    var ch = _chapters[chIdx];
    var pages = _chapterPages[chIdx] || [];
    if (pages.length === 0) {
      $content.innerHTML = '<div class="rdr-loading">该章节暂无内容</div>';
      return;
    }
    var pageText = pages[_currentPage] || '';

    var html = '';
    html += '<div class="rdr-chapter-title">' + escapeHtml(ch.title) + '</div>';
    html += '<div class="rdr-text" id="textBody">' + escapeHtml(pageText) + '</div>';

    // Pagination
    html += '<div class="rdr-pager">';
    html += '<button id="prevPageBtn" ' + (_currentPage === 0 && chIdx === 0 ? 'disabled' : '') + '>◀ 上一页</button>';
    html += '<span class="rdr-page-info">第 ' + (_currentPage + 1) + '/' + pages.length + ' 页</span>';
    html += '<button id="nextPageBtn" ' + (_currentPage === pages.length - 1 && chIdx === _chapters.length - 1 ? 'disabled' : '') + '>下一页 ▶</button>';
    html += '</div>';

    $content.innerHTML = html;
    $textEl = document.getElementById('textBody');
    applyFontSize();

    // Bind pagination buttons
    var prevBtn = document.getElementById('prevPageBtn');
    var nextBtn = document.getElementById('nextPageBtn');
    if (prevBtn) prevBtn.addEventListener('click', prevPage);
    if (nextBtn) nextBtn.addEventListener('click', nextPage);
  }

  function prevPage() {
    if (_currentPage > 0) {
      _currentPage--;
      renderPage();
      $main.scrollTop = 0;
    } else if (_currentChapterIdx > 0) {
      // Go to last page of previous chapter
      var prevChIdx = _currentChapterIdx - 1;
      if (!_chapterPages[prevChIdx] || _chapterPages[prevChIdx].length === 0) {
        loadChapter(prevChIdx).then(function() {
          _currentPage = (_chapterPages[prevChIdx] || []).length - 1;
          renderPage();
          $main.scrollTop = 0;
        });
        return;
      }
      _currentChapterIdx = prevChIdx;
      _currentPage = _chapterPages[prevChIdx].length - 1;
      renderPage();
      updateTocActive();
      $main.scrollTop = 0;
    }
  }

  function nextPage() {
    var pages = _chapterPages[_currentChapterIdx] || [];
    if (_currentPage < pages.length - 1) {
      _currentPage++;
      renderPage();
      $main.scrollTop = 0;
    } else if (_currentChapterIdx < _chapters.length - 1) {
      // Go to first page of next chapter
      var nextChIdx = _currentChapterIdx + 1;
      loadChapter(nextChIdx);
    } else {
      // Last page of last chapter
    }
  }

  // ========== TOC ==========
  function renderToc() {
    var html = '';
    for (var i = 0; i < _chapters.length; i++) {
      html += '<button class="rdr-toc-item' + (i === _currentChapterIdx ? ' active' : '') + '" data-idx="' + i + '">' + escapeHtml(_chapters[i].title) + '</button>';
    }
    $tocList.innerHTML = html;

    // Bind clicks
    var items = $tocList.querySelectorAll('.rdr-toc-item');
    for (var j = 0; j < items.length; j++) {
      items[j].addEventListener('click', function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        closeToc();
        if (idx !== _currentChapterIdx || !_chapterPages[idx] || _chapterPages[idx].length === 0) {
          loadChapter(idx);
        }
      });
    }
  }

  function updateTocActive() {
    var items = $tocList.querySelectorAll('.rdr-toc-item');
    for (var i = 0; i < items.length; i++) {
      items[i].classList.toggle('active', i === _currentChapterIdx);
    }
  }

  // ========== Keyboard Shortcuts ==========
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch(e.key) {
      case 'ArrowLeft': prevPage(); break;
      case 'ArrowRight': nextPage(); break;
      case 'Escape': if (tocOpen) closeToc(); break;
    }
  });

  // ========== Touch swipe for mobile ==========
  var touchStartX = 0, touchStartY = 0;
  document.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive: true});
  document.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
      if (dx < -30) nextPage();
      else if (dx > 30) prevPage();
    }
  });

  // ========== Helpers ==========
  function showLoading(msg) {
    $content.innerHTML = '<div class="rdr-loading"><div class="rdr-spinner"></div>' + escapeHtml(msg || '加载中...') + '</div>';
  }

  function showError(msg) {
    $content.innerHTML = '<div class="rdr-error"><div class="rdr-error-icon">⚠️</div><div class="rdr-error-title">加载失败</div><div>' + escapeHtml(msg) + '</div><a href="{{ download_url }}">📥 下载文件</a></div>';
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ========== Init ==========
  (async function init() {
    try {
      await fetchInfo();
      await loadChapter(0);
    } catch(e) {
      showError(e.message || '初始化失败');
    }
  })();
})();
</script>
</body>
</html>
